version: '3.9'
# ── PRODUCTION ──────────────────────────────────────────────────────────────────
# Used by: .github/workflows/cd-prod.yml
# No DB/Redis ports exposed externally. TLS via Certbot/Let's Encrypt.
# ──────────────────────────────────────────────────────────────────────────────

networks:
  prod_net:
    name: imposter_prod_net

services:
  postgres:
    image: postgres:16-alpine
    container_name: imposter-postgres-prod
    environment:
      POSTGRES_DB: imposter_game_prod
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks: [prod_net]
    # NOT exposed externally — internal only
    expose:
      - "5432"

  redis:
    image: redis:7-alpine
    container_name: imposter-redis-prod
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: always
    networks: [prod_net]
    expose:
      - "6379"

  api:
    image: ghcr.io/shakayz/guess-who/api:latest
    container_name: imposter-api-prod
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/imposter_game_prod
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      APP_URL: ${APP_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID}
      APPLE_TEAM_ID: ${APPLE_TEAM_ID}
      APPLE_KEY_ID: ${APPLE_KEY_ID}
      APPLE_PRIVATE_KEY: ${APPLE_PRIVATE_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
    expose:
      - "3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    networks: [prod_net]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  web:
    image: ghcr.io/shakayz/guess-who/web:latest
    container_name: imposter-web-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      api:
        condition: service_healthy
    restart: always
    networks: [prod_net]

  # Automatic TLS certificate renewal
  certbot:
    image: certbot/certbot
    container_name: imposter-certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"
    restart: unless-stopped
    networks: [prod_net]

volumes:
  postgres_prod_data:
  redis_prod_data:
  certbot_webroot:
