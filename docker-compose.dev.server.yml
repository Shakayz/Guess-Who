version: '3.9'
# ── Deployed DEV environment — uses pre-built GHCR :dev images ─────────────────
# Used by: .github/workflows/cd-dev.yml
# For local development with hot-reload: use docker-compose.dev.yml instead
# ──────────────────────────────────────────────────────────────────────────────

networks:
  dev_net:
    name: imposter_dev_net

services:
  postgres:
    image: postgres:16-alpine
    container_name: imposter-postgres-dev
    environment:
      POSTGRES_DB: imposter_game_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [dev_net]
    # Exposed for developer inspection
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: imposter-redis-dev
    command: redis-server --appendonly yes
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks: [dev_net]
    expose:
      - "6379"

  api:
    image: ghcr.io/shakayz/guess-who/api:dev
    container_name: imposter-api-dev
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/imposter_game_dev
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      APP_URL: ${APP_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    expose:
      - "3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks: [dev_net]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  web:
    image: ghcr.io/shakayz/guess-who/web:dev
    container_name: imposter-web-dev
    ports:
      - "3080:80"    # port 3080 to avoid conflict with pfv:8080 and prod:80
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks: [dev_net]

volumes:
  postgres_dev_data:
  redis_dev_data:
