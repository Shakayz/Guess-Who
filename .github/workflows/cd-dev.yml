name: CD — Dev

# Triggered on every push to develop (after CI passes)
on:
  push:
    branches: [develop]

concurrency:
  group: deploy-dev
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  # ─────────────────────────────────────────
  # 1. Build & push Docker images tagged :dev
  # ─────────────────────────────────────────
  build-push:
    name: Build & Push (dev)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Set lowercase repo name
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}/api:dev
            ghcr.io/${{ env.REPO_LC }}/api:dev-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}/web:dev
            ghcr.io/${{ env.REPO_LC }}/web:dev-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # 2. Deploy to dev server
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: build-push
    environment: development
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEV_SSH_HOST }}
          username: ${{ secrets.DEV_SSH_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          source: docker-compose.dev.server.yml
          target: /opt/imposter-game/

      - name: Deploy to Dev server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEV_SSH_HOST }}
          username: ${{ secrets.DEV_SSH_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          script: |
            set -e
            cd /opt/imposter-game

            # Write environment file
            cat > .env.dev << 'ENVEOF'
            POSTGRES_PASSWORD=${{ secrets.DEV_POSTGRES_PASSWORD }}
            JWT_SECRET=${{ secrets.DEV_JWT_SECRET }}
            ALLOWED_ORIGINS=${{ secrets.DEV_ALLOWED_ORIGINS }}
            APP_URL=${{ secrets.DEV_APP_URL }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            ENVEOF

            # Login to GHCR on server
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest :dev images
            docker compose -f docker-compose.dev.server.yml --env-file .env.dev pull

            # Rolling restart
            docker compose -f docker-compose.dev.server.yml --env-file .env.dev up -d --remove-orphans

            # Health check
            echo "Waiting for API..."
            for i in $(seq 1 12); do
              if docker exec imposter-api-dev wget -qO- http://localhost:3001/health > /dev/null 2>&1; then
                echo "✅ Dev deployed — SHA: ${{ github.sha }}"
                docker image prune -f
                exit 0
              fi
              echo "Attempt $i/12 — waiting 5s..."
              sleep 5
            done
            echo "❌ Dev health check failed"
            exit 1
