name: CD — Dev

# Triggered on every push to develop (after CI passes)
on:
  push:
    branches: [develop]

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────
  # 1. Build & push Docker images tagged :dev
  # ─────────────────────────────────────────
  build-push:
    name: Build & Push (dev)
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:dev
            ghcr.io/${{ github.repository }}/api:dev-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/web:dev
            ghcr.io/${{ github.repository }}/web:dev-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # 2. Deploy to dev server
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: build-push
    environment: development
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Dev server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEV_SSH_HOST }}
          username: ${{ secrets.DEV_SSH_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          script: |
            set -e
            cd /opt/imposter-game

            # Write environment file from GitHub secrets
            cat > .env.dev << 'ENVEOF'
            NODE_ENV=development
            PORT=3001
            DATABASE_URL=${{ secrets.DEV_DATABASE_URL }}
            REDIS_URL=${{ secrets.DEV_REDIS_URL }}
            JWT_SECRET=${{ secrets.DEV_JWT_SECRET }}
            ALLOWED_ORIGINS=${{ secrets.DEV_ALLOWED_ORIGINS }}
            APP_URL=${{ secrets.DEV_APP_URL }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            ENVEOF

            # Pull latest dev images
            docker compose -f docker-compose.dev.yml pull

            # Rolling restart
            docker compose -f docker-compose.dev.yml up -d --remove-orphans

            # Clean up old images
            docker image prune -f

            echo "✅ Dev deployed — SHA: ${{ github.sha }}"
