name: CD — PFV (Pré-Production)

# Triggered on push to staging branch
on:
  push:
    branches: [staging]
  # Allow manual trigger from any branch for hotfix testing
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual PFV deployment'
        required: true
        default: 'Manual validation deployment'

concurrency:
  group: deploy-pfv
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────
  # 1. Build & push Docker images tagged :pfv
  # ─────────────────────────────────────────
  build-push:
    name: Build & Push (pfv)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:pfv
            ghcr.io/${{ github.repository }}/api:pfv-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/web:pfv
            ghcr.io/${{ github.repository }}/web:pfv-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # 2. Deploy to PFV server (requires environment approval if configured)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to PFV
    runs-on: ubuntu-latest
    needs: build-push
    environment: pfv          # Configure required reviewers in GitHub → Settings → Environments
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to PFV server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PFV_SSH_HOST }}
          username: ${{ secrets.PFV_SSH_USER }}
          key: ${{ secrets.PFV_SSH_KEY }}
          script: |
            set -e
            cd /opt/imposter-game

            # Write PFV environment file
            cat > .env.pfv << 'ENVEOF'
            NODE_ENV=production
            PORT=3001
            DATABASE_URL=${{ secrets.PFV_DATABASE_URL }}
            REDIS_URL=${{ secrets.PFV_REDIS_URL }}
            JWT_SECRET=${{ secrets.PFV_JWT_SECRET }}
            ALLOWED_ORIGINS=${{ secrets.PFV_ALLOWED_ORIGINS }}
            APP_URL=${{ secrets.PFV_APP_URL }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_TEST_KEY }}
            STRIPE_WEBHOOK_SECRET=${{ secrets.PFV_STRIPE_WEBHOOK_SECRET }}
            POSTGRES_PASSWORD=${{ secrets.PFV_POSTGRES_PASSWORD }}
            REDIS_PASSWORD=${{ secrets.PFV_REDIS_PASSWORD }}
            ENVEOF

            # Update image references to pfv tag
            export API_IMAGE=ghcr.io/${{ github.repository }}/api:pfv-${{ github.sha }}
            export WEB_IMAGE=ghcr.io/${{ github.repository }}/web:pfv-${{ github.sha }}

            # Pull and deploy
            docker compose -f docker-compose.prod.yml --env-file .env.pfv pull
            docker compose -f docker-compose.prod.yml --env-file .env.pfv up -d --remove-orphans

            # Health check — wait up to 60s for API to be ready
            echo "Waiting for API health check..."
            for i in $(seq 1 12); do
              if docker exec imposter-api-prod wget -qO- http://localhost:3001/health > /dev/null 2>&1; then
                echo "✅ PFV deployed — SHA: ${{ github.sha }}"
                exit 0
              fi
              echo "Attempt $i/12 — waiting 5s..."
              sleep 5
            done
            echo "❌ Health check failed after 60s"
            exit 1

      - name: Notify deployment status
        if: always()
        run: |
          echo "PFV Deployment ${{ job.status }} for SHA ${{ github.sha }}"
