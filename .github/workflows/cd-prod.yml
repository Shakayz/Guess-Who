name: CD — Production

# Only triggered by push to main OR manual dispatch
# Requires manual approval via GitHub environment protection rules
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for this production deployment'
        required: true
      sha_override:
        description: 'Optional — deploy a specific SHA (leave empty for HEAD)'
        required: false

concurrency:
  group: deploy-prod
  cancel-in-progress: false   # Never cancel in-flight production deploys

permissions:
  contents: read
  packages: write

jobs:
  # ─────────────────────────────────────────
  # 1. Build & push images tagged :latest + :SHA
  # ─────────────────────────────────────────
  build-push:
    name: Build & Push (prod)
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.set-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.sha_override || github.sha }}

      - id: set-tag
        run: echo "tag=${{ github.event.inputs.sha_override || github.sha }}" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - name: Set lowercase repo name
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}/api:latest
            ghcr.io/${{ env.REPO_LC }}/api:${{ steps.set-tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}/web:latest
            ghcr.io/${{ env.REPO_LC }}/web:${{ steps.set-tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # 2. Manual approval gate
  #    GitHub → Settings → Environments → production → Required reviewers
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-push
    environment: production    # ← APPROVAL REQUIRED here
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          source: docker-compose.prod.yml
          target: /opt/imposter-game/

      - name: Deploy to Production server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd /opt/imposter-game

            # Save current image for rollback
            PREV_TAG=$(docker inspect imposter-api-prod --format '{{.Config.Image}}' 2>/dev/null || echo "none")
            echo "$PREV_TAG" > .last-prod-image
            echo "Previous image: $PREV_TAG"

            # Write production environment file
            cat > .env.prod << 'ENVEOF'
            POSTGRES_PASSWORD=${{ secrets.PROD_POSTGRES_PASSWORD }}
            REDIS_PASSWORD=${{ secrets.PROD_REDIS_PASSWORD }}
            JWT_SECRET=${{ secrets.PROD_JWT_SECRET }}
            ALLOWED_ORIGINS=${{ secrets.PROD_ALLOWED_ORIGINS }}
            APP_URL=${{ secrets.PROD_APP_URL }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            APPLE_CLIENT_ID=${{ secrets.APPLE_CLIENT_ID }}
            APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}
            APPLE_KEY_ID=${{ secrets.APPLE_KEY_ID }}
            APPLE_PRIVATE_KEY=${{ secrets.APPLE_PRIVATE_KEY }}
            STRIPE_SECRET_KEY=${{ secrets.PROD_STRIPE_SECRET_KEY }}
            STRIPE_WEBHOOK_SECRET=${{ secrets.PROD_STRIPE_WEBHOOK_SECRET }}
            ENVEOF

            # Login to GHCR on server
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull new :latest images
            docker compose -f docker-compose.prod.yml --env-file .env.prod pull

            # Rolling restart — API first, then Web (zero-downtime)
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --no-deps api
            sleep 10
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --no-deps web

            # Health check — wait up to 90s
            echo "Running production health check..."
            for i in $(seq 1 18); do
              if docker exec imposter-api-prod wget -qO- http://localhost:3001/health > /dev/null 2>&1; then
                echo "✅ Production deployed — SHA: ${{ needs.build-push.outputs.image_tag }}"
                docker image prune -f
                exit 0
              fi
              echo "Attempt $i/18 — waiting 5s..."
              sleep 5
            done

            # Auto-rollback on failure
            echo "❌ Health check failed — initiating rollback..."
            PREV=$(cat .last-prod-image)
            if [ "$PREV" != "none" ]; then
              docker pull "$PREV"
              docker tag "$PREV" ghcr.io/shakayz/guess-who/api:latest
              docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --no-deps api
              echo "⚠️ Rolled back to $PREV"
            fi
            exit 1

      - name: Tag release in git
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "release-$(date +'%Y%m%d-%H%M')-${{ needs.build-push.outputs.image_tag }}" || true
          git push --tags || true
