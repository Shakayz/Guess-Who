version: '3.9'
# ── PFV (Pré-Production/Validation) ────────────────────────────────────────────
# Used by: .github/workflows/cd-pfv.yml
# Production-like config with separate DB and QA-accessible ports
# ──────────────────────────────────────────────────────────────────────────────

networks:
  pfv_net:
    name: imposter_pfv_net

services:
  postgres:
    image: postgres:16-alpine
    container_name: imposter-postgres-pfv
    environment:
      POSTGRES_DB: imposter_game_pfv
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_pfv_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [pfv_net]
    # Exposed for QA inspection (not in prod)
    ports:
      - "5433:5432"

  redis:
    image: redis:7-alpine
    container_name: imposter-redis-pfv
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_pfv_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks: [pfv_net]
    ports:
      - "6380:6379"

  api:
    image: ghcr.io/shakayz/guess-who/api:pfv
    platform: linux/amd64
    container_name: imposter-api-pfv
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/imposter_game_pfv
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      APP_URL: ${APP_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
    expose:
      - "3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks: [pfv_net]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  web:
    image: ghcr.io/shakayz/guess-who/web:pfv
    platform: linux/amd64
    container_name: imposter-web-pfv
    ports:
      - "8080:80"    # port 8080 to avoid conflict with dev:3080 and prod:80
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks: [pfv_net]

volumes:
  postgres_pfv_data:
  redis_pfv_data:
